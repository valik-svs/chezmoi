"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "

[git_branch]
symbol = "ïگک"
style = "fg:prompt_git"
format = '[\[ $symbol $branch]($style)'

[git_status]
style = "fg:prompt_git_dirty"
format = '[$all_status$ahead_behind]($style)[ \]](fg:prompt_git)'
conflicted = "="
ahead = "â‡،"
behind = "â‡£"
diverged = "â‡•"
up_to_date = " "
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "آ»"
deleted = "âœک"

[nodejs]
symbol = "îœک"
style = "fg:prompt_lang"
