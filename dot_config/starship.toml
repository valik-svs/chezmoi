[c]
symbol = "îک‍ "
style = "fg:prompt_lang"
format = '[\[[ $symbol( $version) ]($style)\]]()'

[rust]
symbol = "î‍¨"
style = "fg:prompt_lang"
format = '[\[[ $symbol( $version) ]($style)\]]()'

[golang]
symbol = "îک§"
style = "fg:prompt_lang"
format = '[\[[ $symbol( $version) ]($style)\]]()'

[php]
symbol = "îکˆ"
style = "fg:prompt_lang"
format = '[\[[ $symbol( $version) ]($style)\]]()'

[java]
symbol = "î‰– "
style = "fg:prompt_lang"
format = '[\[[ $symbol( $version) ]($style)\]]()'

[kotlin]
symbol = "îک´"
style = "fg:prompt_lang"
format = '[\[[ $symbol( $version) ]($style)\]]()'

[haskell]
symbol = "îکں"
style = "fg:prompt_lang"
format = '[\[[ $symbol( $version) ]($style)\]]()'

[python]
symbol = "îک†"
style = "fg:prompt_lang"
format = '[\[[ $symbol(\(#$virtualenv\)) ]($style)\]]()'

[docker_context]
symbol = "ïŒˆ"
style = "fg:prompt_env"
format = '[\[[ $symbol( $context) ]($style)\]]()'

[conda]
symbol = " ï„Œ "
style = "fg:prompt_env"
format = '[\[[ $symbol$environment ]($style)\]]()'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "fg:prompt_time"

format = '[\[[ ïگ؛ $time ]($style)\]]()'

[line_break]
disabled = true

[character]
disabled = false
format = """â•°âˆ¹$symbol """
success_symbol = '[>](bold fg:prompt_success)'
error_symbol = '[>](bold fg:prompt_error)'
vimcmd_symbol = '[â‌®](bold fg:green)'
vimcmd_replace_one_symbol = '[â‌®](bold fg:lavender)'
vimcmd_replace_symbol = '[â‌®](bold fg:lavender)'
vimcmd_visual_symbol = '[â‌®](bold fg:yellow)'


[cmd_duration]
show_milliseconds = true
style = "fg:prompt_muted"
format = "[î«´ in $duration ]($style)"
disabled = false
show_notifications = true
min_time_to_notify = 45000

