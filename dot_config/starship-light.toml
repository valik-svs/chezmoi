"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
command_timeout = 1000

format = """
$os\
$username\
$directory\
$hg_branch\
$git_branch\
$git_commit\
$git_status\
$git_state\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$cmd_duration\
$line_break\
\n$character
"""


palette = 'svs_light'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = "ÓúŹ"
Ubuntu = "ůįēą"
SUSE = "ÔĆĒ"
Raspbian = "ůįźŅ"
Mint = "ůį£≠"
Macos = "[‚ē≠‚Čļ](fg:prompt_line)ůįÄĶ "
Manjaro = "ÔĆí"
Linux = "ůįĆĹ"
Gentoo = "ůį£®"
Fedora = "ůį£õ"
Alpine = "ÔĆÄ"
Amazon = "ÔČį"
Android = "Óúé"
AOSC = "ÔĆĀ"
Arch = "ůį£á"
Artix = "ůį£á"
CentOS = "ÔĆĄ"
Debian = "ůį£ö"
Redhat = "ůĪĄõ"
RedHatEnterprise = "ůĪĄõ"

[username]
show_always = true
style_user = "fg:prompt_user"
style_root = "fg:prompt_root"
format = '[$user[‚ČĽ](fg:prompt_line)]($style)'

[hostname]
ssh_only = false
style = "fg:prompt_host"
format = '[‚ēí](fg:prompt_line)[\[$hostname\]]($style)'

[directory]
style = "fg:prompt_dir"
format = '[[‚Čļ](fg:prompt_line)$path[‚ČĽ](fg:prompt_line)]($style)'
truncation_length = 3
truncation_symbol = "‚Ä¶/"


[directory.substitutions]
"Documents" = "ůįßģ "
"Music" = "ÔÄĀ "
"Movies" = "ůįŅŹ "
"Pictures" =  "ÔÄĺ"
"Sources" = "ÔĄ° "
"Downloads" = "ÔÄô "


[git_branch]
disabled = false
symbol = "Ôźė "
style = "fg:prompt_git"
#truncation_length = 5   # length == ABCDE
format = '[‚Čļ](fg:prompt_line)[$symbol$branch(:$remote_branch)[‚ČĽ](fg:prompt_line)]($style)' # this sets path ../../../../

[git_commit]
disabled = false
commit_hash_length = 1

[git_state]
disabled = false
rebase = "rebasing"
merge = "merging"
revert = "reverting"
cherry_pick = "Óäõ picking"
bisect = "bisecting"
am = "am'ing"
am_or_rebase = "am/rebase"

[git_status]
disabled = false
style= "fg:prompt_git_dirty"
#format = '[ $all_status$ahead_behind]($style)[ ‚ČĽ](fg:prompt_line)'
stashed = "ÔÄú ${count} "
ahead = "ůįěô ${count} "
behind = "ůįěí ${count} "
diverged = "ůįĶČ ${ahead_count} ${behind_count} "
conflicted = "ÔÄ§ ${count} "
deleted = "Ôíé ${count} "
renamed = "ÔĄ≠ ${count} "
modified = "ÔĀĄ ${count} "
staged = "Ôáô ${count} "
untracked = "ůĪÖė ${count}"
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~     ...........       ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #

[nodejs]
symbol = "Óúė"
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $version)]($style)[‚ČĽ](fg:prompt_line)]()'

[c]
symbol = "Óėě "
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $version)]($style)[‚ČĽ](fg:prompt_line)]()'

[rust]
symbol = "Óě®"
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $version)]($style)[‚ČĽ](fg:prompt_line)]()'

[golang]
symbol = "Óėß"
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $version)]($style)[‚ČĽ](fg:prompt_line)]()'

[php]
symbol = "Óėą"
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $version)]($style)[‚ČĽ](fg:prompt_line)]()'

[java]
symbol = "ÓČĖ "
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $version)]($style)[‚ČĽ](fg:prompt_line)]()'

[kotlin]
symbol = "Óėī"
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $version)]($style)[‚ČĽ](fg:prompt_line)]()'

[haskell]
symbol = "Óėü"
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $version)]($style)[‚ČĽ](fg:prompt_line)]()'

[python]
symbol = "ÓėÜ"
style = "fg:prompt_lang"
format = '[[‚Čļ](fg:prompt_line)[$symbol (\(#$virtualenv\))]($style)[‚ČĽ](fg:prompt_line)]()'

[docker_context]
symbol = "ÔĆą"
style = "fg:prompt_env"
format = '[[‚Čļ](fg:prompt_line)[$symbol( $context)]($style)[‚ČĽ](fg:prompt_line)]()'

[conda]
symbol = " ÔĄĆ "
style = "fg:prompt_env"
format = '[[‚Čļ](fg:prompt_line)[$symbol$environment]($style)[‚ČĽ](fg:prompt_line)]()'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "fg:prompt_time"

format = '[[‚Čļ](fg:prompt_line)[Ôźļ $time]($style)[‚ČĽ](fg:prompt_line)]()'

[line_break]
disabled = true

[character]
disabled = false
format = """$symbol"""
success_symbol = '[‚ēį](fg:prompt_line)[ÔÉö](fg:prompt_line)'
error_symbol = '[‚ēį](fg:prompt_line)[ÔÉö](bold fg:prompt_error)'
vimcmd_symbol = '[‚Ěģ](bold fg:green)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:yellow)'


[cmd_duration]
show_milliseconds = true
style = "fg:prompt_muted"
format = "[[‚Čļ](fg:prompt_line)Óęī in $duration[‚ČĽ](fg:prompt_line)]($style)"
disabled = false
show_notifications = true
min_time_to_notify = 45000

